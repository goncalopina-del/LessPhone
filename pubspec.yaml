name: present_app
description: "Present — Reconnect with the people that matter most."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1
  flutter_appauth: ^8.0.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  purchases_flutter: ^7.0.2
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  uuid: ^4.4.2
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/animations/
    - assets/fonts/
    - assets/images/
