name: Deploy Web (GitHub Pages)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      - name: Analyze
        run: flutter analyze > analyze.log 2>&1

      - name: Build web
        run: |
          flutter build web \
            --base-href=/LessPhone/ \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" > build.log 2>&1

      - name: Post logs
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os, json, urllib.request
          tok = os.environ['GITHUB_TOKEN']
          sha = os.environ['GITHUB_SHA']
          parts = []
          for name in ["analyze.log", "build.log"]:
            try:
              parts.append(f"=== {name} ===\n" + open(name, errors='replace').read()[-2500:])
            except Exception:
              parts.append(f"=== {name} ===\n(no file)")
          body = "CI LOGS (tail):\n```\n" + "\n".join(parts) + "\n```"
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
            f"https://api.github.com/repos/goncalopina-del/LessPhone/commits/{sha}/comments",
            data=data,
            headers={"Authorization":"Bearer "+tok,"Accept":"application/vnd.github+json","User-Agent":"ci","Content-Type":"application/json"})
          try:
            urllib.request.urlopen(req); print("posted")
          except Exception as e:
            print("post failed", e)
          PY

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true
